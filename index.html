<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You and English</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- STICKY CTA -->
    <div class="sticky-cta" id="stickyCTA">
      <div class="sticky-inner">
        <span class="sticky-text"> Начни говорить свободно </span>

        <button class="btn primary">Купить — 15€</button>
      </div>
    </div>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-container">
        <!-- LEFT: BOOK -->
        <div class="hero-left">
          <div class="book">
            <div class="book-cover">YOU<br />AND<br />ENGLISH</div>
          </div>
        </div>

        <!-- RIGHT: CONTENT -->
        <div class="hero-right">
          <h1>Начни думать на английском</h1>

          <p class="subtitle">Без зубрежки. Без перевода в голове.</p>

          <div class="price">
            <span class="new">15€</span>
            <span class="old">25€</span>
          </div>

          <div class="buttons">
            <button class="btn primary big">Купить — 15€</button>

            <button class="btn secondary" id="scrollBtn">Подробнее</button>
          </div>
        </div>
      </div>
    </section>

    <!-- NEXT SECTION -->
    <section class="about" id="about">
      <h2>О книге</h2>
      <p>Контент будет здесь</p>
      <div style="height: 800px"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
